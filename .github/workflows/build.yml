name: Build & Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:        # allow manual trigger from the GitHub UI

# Cancel in-progress runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # PyQt6 needs a virtual display on Linux CI
      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxkbcommon-x11-0 \
            xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (headless)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests/ -v --tb=short

  # ── Build Windows ────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows Executable
    needs: test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller obsidianclone.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ObsidianClone-windows
          path: dist/ObsidianClone/
          retention-days: 30
          if-no-files-found: error

  # ── Build macOS ──────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS Executable
    needs: test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller obsidianclone.spec

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ObsidianClone-macos
          path: dist/ObsidianClone/
          retention-days: 30
          if-no-files-found: error

  # ── Build Linux ──────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux Executable
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m PyInstaller obsidianclone.spec

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ObsidianClone-linux
          path: dist/ObsidianClone/
          retention-days: 30
          if-no-files-found: error

  # ── Draft GitHub Release (main branch only) ───────────────────────────────
  release:
    name: Draft Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Zip platform bundles
        run: |
          cd artifacts
          for dir in */; do
            zip -r "${dir%/}.zip" "$dir"
          done

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          draft: true
          files: artifacts/*.zip
          body: |
            Automated build from commit ${{ github.sha }}

            **Platforms included:**
            - `ObsidianClone-windows.zip` — Windows 64-bit
            - `ObsidianClone-macos.zip`   — macOS (Apple Silicon + Intel)
            - `ObsidianClone-linux.zip`   — Linux 64-bit

            Extract the zip and run `ObsidianClone` (or `ObsidianClone.exe`).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
